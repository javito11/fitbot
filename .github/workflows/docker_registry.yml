name: Push docker image to registry (hub.docker.com)

on:
  push:
    branches:
      - 'master'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: "javisan"
          password: "Hyrox1234"
      -
        name: Build and push
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: javisan/fitbot:latest
